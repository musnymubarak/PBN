<!--
  Minimal email signature: name, role, contact line.
  No logo, no tagline badge, no social row — kept in line with modern
  transactional email aesthetics (Stripe / Linear / Vercel).
-->
<div style="margin-top:8px;">
  <div style="font-size:14px; font-weight:600; color:#0f172a; line-height:1.4;">{{ sender_name | default("PBN Support Team") }}</div>
  <div style="font-size:13px; color:#64748b; margin-top:2px; line-height:1.5;">{{ sender_title | default("Prime Business Network (Pvt) Ltd.") }}</div>
  <div style="font-size:13px; color:#64748b; margin-top:10px; line-height:1.5;">
    <a href="mailto:{{ sender_email | default('info@primebusiness.network') }}" style="color:#64748b; text-decoration:underline;">{{ sender_email | default('info@primebusiness.network') }}</a>
    &nbsp;·&nbsp;
    <a href="https://primebusiness.network" style="color:#64748b; text-decoration:underline;">primebusiness.network</a>
    {% if sender_phone %}
    &nbsp;·&nbsp;
    <a href="tel:{{ sender_phone }}" style="color:#64748b; text-decoration:underline;">{{ sender_phone }}</a>
    {% endif %}
  </div>
</div>
