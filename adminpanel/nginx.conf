server {
    listen 80;
    server_name localhost api.primebusiness.network admin.primebusiness.network;

    # Gateway Settings
    client_max_body_size 10M;

    # Health Check (used by mobile app to verify connectivity)
    location /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # API Gateway (Proxy to Backend)
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Static Files (Profile Photos, etc.)
    location /static/ {
        proxy_pass http://api:8000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Admin Panel (Frontend) - serves on all domains
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# Public marketing website — primebusiness.network
# Reached via the same host port as the admin gateway (no new port).
# Host nginx routes primebusiness.network → 127.0.0.1:8005, and the block
# below matches by Host header and proxies to the pbn-website container.
#
# Exception: /onboard, /api/, /static/, /assets/, and /tshirt/ are served from
# the admin React bundle / backend API so the post-approval onboarding wizard
# works on the public domain.
server {
    listen 80;
    server_name primebusiness.network www.primebusiness.network;
    client_max_body_size 10M;

    # Onboarding wizard (React SPA route). Anything under /onboard hits the
    # admin SPA's index.html, which renders <OnboardingPage> for that path.
    location /onboard {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # Vite-built JS/CSS bundles referenced by index.html.
    location /assets/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 7d;
    }

    # T-shirt images bundled with the admin SPA's public assets.
    location /tshirt/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 30d;
    }

    # Backend API + uploaded static files (same as the admin host block).
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location /static/ {
        proxy_pass http://api:8000/static/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Everything else → static marketing site (Apache container).
    location / {
        proxy_pass http://website:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
