version: "3.9"

services:
  # ── Backend (API) ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pbn-api
    restart: unless-stopped
    # We do NOT expose port 8000 to the host here. 
    # It will only be accessible via the adminpanel gateway.
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://pbn_user:pbn_secret_password@postgres:5432/pbn_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pbn-network

  # ── Admin Panel & Gateway ─────────────────────────────────
  adminpanel:
    build:
      context: ./adminpanel
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api/v1
    container_name: pbn-admin
    restart: unless-stopped
    ports:
      - "8005:80"  # Combined entry point on port 8005
    depends_on:
      - api
    networks:
      - pbn-network

  # ── PostgreSQL 16 ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pbn-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pbn_user
      POSTGRES_PASSWORD: pbn_secret_password
      POSTGRES_DB: pbn_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pbn_user -d pbn_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pbn-network

  # ── Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pbn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pbn-network

volumes:
  postgres_data:
    external: true
    name: backend_postgres_data
  redis_data:
    external: true
    name: backend_redis_data

networks:
  pbn-network:
    driver: bridge
