<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success | Prime Business Network</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link href="https://fonts.bunny.net/css?family=dm-sans:300,400,500,600,700,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #080d24;
            --navy-mid: #0e1535;
            --navy-light: #162050;
            --white: #ffffff;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --success: #059669;
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-muted: #7a85b0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--navy);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(5, 150, 105, 0.08) 0%, transparent 70%);
            z-index: -1;
            filter: blur(40px);
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        .card {
            background: linear-gradient(145deg, var(--navy-mid), var(--navy-light));
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
        }

        .logo-box {
            margin-bottom: 25px;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo-text span {
            color: var(--gold);
        }

        .status-icon-wrap {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: var(--success);
            background: rgba(5, 150, 105, 0.1);
        }

        .status-icon-wrap::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 2px solid currentColor;
            opacity: 0.2;
            animation: ripple 2s infinite;
        }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: var(--navy);
            text-decoration: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(201, 168, 76, 0.2);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container">
        <div class="card">
            <div class="logo-box">
                <span class="logo-text">Prime <span>Business</span> Network</span>
            </div>

            <div class="status-icon-wrap">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>

            <h1>Payment Successful!</h1>
            <p>Your online payment has been processed successfully. Your PBN membership status is now active. Please open your mobile app to access all features.</p>
            
            <a href="https://portal.primebusiness.network" class="btn">Go to Member Portal</a>
        </div>
    </div>
</body>
</html>
