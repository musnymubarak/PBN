# Host nginx vhost for primebusiness.network
# Copy this file to /etc/nginx/sites-available/primebusiness.network
# then: sudo ln -s ... /etc/nginx/sites-enabled/  and  sudo nginx -t && sudo systemctl reload nginx
#
# After Let's Encrypt is issued, certbot will append the listen 443 ssl block automatically.

server {
    listen 80;
    listen [::]:80;
    server_name primebusiness.network www.primebusiness.network;

    # Let's Encrypt http-01 challenge — keep this even after SSL is up
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else → pbn-admin container (port 8005), which routes
    # by Host: header to the pbn-website container internally.
    location / {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
